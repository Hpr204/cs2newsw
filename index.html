<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 НОВОСТИ | Реальные новости CS2</title>
    
    <!-- ===== ИКОНКА САЙТА (ФАВИКОН) ИЗ ЛОГОТИПА ===== -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='url(%23grad)'/><text x='50' y='70' font-size='50' text-anchor='middle' fill='%230a0c0f' font-weight='900'>H2</text><defs><linearGradient id='grad'><stop offset='0%25' stop-color='%23ffd700'/><stop offset='100%25' stop-color='%23ff8c00'/></linearGradient></defs></svg>">
    <link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='url(%23grad)'/><text x='50' y='70' font-size='50' text-anchor='middle' fill='%230a0c0f' font-weight='900'>H2</text><defs><linearGradient id='grad'><stop offset='0%25' stop-color='%23ffd700'/><stop offset='100%25' stop-color='%23ff8c00'/></linearGradient></defs></svg>">
    
    <!-- SEO мета-теги -->
    <meta name="description" content="Реальные новости Counter-Strike 2 с HLTV.org на русском. Свежие обновления, патчи, турниры и события CS2.">
    <meta name="keywords" content="CS2 новости, Counter-Strike 2, HLTV, обновления CS2, патчи CS2, турниры CS2">
    <meta name="author" content="CS2 HUB">
    <meta name="robots" content="index, follow">
    
    <!-- Шрифты и иконки -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c0f;
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255, 215, 0, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(255, 140, 0, 0.05) 0%, transparent 50%),
                        repeating-linear-gradient(45deg, rgba(255, 215, 0, 0.02) 0px, rgba(255, 215, 0, 0.02) 2px, transparent 2px, transparent 10px);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        header {
            background: rgba(10, 12, 15, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            padding: 15px 40px;
            margin: 20px 0 40px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        header:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 215, 0, 0.4);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .custom-logo {
            width: 60px;
            height: 60px;
            position: relative;
            margin-right: 5px;
        }

        .logo-circle {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
            50% { box-shadow: 0 0 30px rgba(255, 215, 0, 0.8); }
            100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
        }

        .logo-text {
            color: #0a0c0f;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -2px;
            z-index: 2;
        }

        .logo-highlight {
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .crosshair {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        .crosshair::before,
        .crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
        }

        .crosshair::before {
            width: 2px;
            height: 20px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .crosshair::after {
            width: 20px;
            height: 2px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .logo-ring {
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            border: 2px solid transparent;
            border-top: 2px solid #ffd700;
            border-right: 2px solid #ff8c00;
            border-radius: 50%;
            animation: spin 3s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        header h1 {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd700, #ff8c00, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shine 3s linear infinite;
            letter-spacing: 2px;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        nav {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            align-items: center;
        }

        nav a {
            text-decoration: none;
            color: #fff;
            font-weight: 500;
            transition: all 0.3s;
            font-size: 16px;
            opacity: 0.7;
            position: relative;
            padding: 5px 0;
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #ffd700, #ff8c00);
            transition: width 0.3s ease;
        }

        nav a:hover {
            opacity: 1;
            color: #ffd700;
        }

        nav a:hover::after {
            width: 100%;
        }

        nav a.active {
            color: #ffd700;
            opacity: 1;
        }

        nav a.active::after {
            width: 100%;
        }

        .header-title {
            text-align: center;
            margin: 40px 0;
        }

        .header-title h2 {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd700, #ff8c00, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shine 3s linear infinite;
            margin-bottom: 10px;
        }

        .header-title p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
        }

        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 0, 0, 0.1);
            padding: 8px 20px;
            border-radius: 50px;
            margin-top: 15px;
            border: 1px solid rgba(255, 0, 0, 0.3);
            font-size: 14px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #ff0000;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin: 40px 0;
        }

        .news-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .news-card:hover {
            transform: translateY(-5px);
            border-color: #ffd700;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.1);
        }

        .news-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.05) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.6s;
            pointer-events: none;
        }

        .news-card:hover::before {
            opacity: 1;
        }

        .news-source {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            color: #ffd700;
            font-size: 14px;
        }

        .news-source i {
            font-size: 18px;
        }

        .news-card h3 {
            font-size: 20px;
            margin-bottom: 12px;
            line-height: 1.4;
            color: #fff;
            font-weight: 600;
        }

        .news-card p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .news-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            border-top: 1px solid rgba(255, 215, 0, 0.1);
            padding-top: 15px;
        }

        .news-footer i {
            color: #ffd700;
            margin-right: 5px;
            font-size: 12px;
        }

        .news-link {
            color: #ffd700;
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .news-link:hover {
            gap: 10px;
            text-decoration: underline;
        }

        .loading {
            text-align: center;
            padding: 60px;
            grid-column: 1 / -1;
        }

        .loading i {
            font-size: 48px;
            color: #ffd700;
            margin-bottom: 20px;
        }

        .error {
            text-align: center;
            padding: 60px;
            grid-column: 1 / -1;
        }

        .error i {
            font-size: 48px;
            color: #e74c3c;
            margin-bottom: 20px;
        }

        .error h3 {
            color: #e74c3c;
            margin-bottom: 10px;
        }

        .error p {
            color: rgba(255, 255, 255, 0.6);
        }

        .error a {
            color: #ffd700;
            text-decoration: none;
        }

        footer {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px;
            margin-top: 50px;
            text-align: center;
        }

        footer p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 20px;
        }

        .social-links {
            display: flex;
            gap: 25px;
            justify-content: center;
        }

        .social-links a {
            color: rgba(255, 255, 255, 0.6);
            font-size: 24px;
            transition: all 0.3s;
        }

        .social-links a:hover {
            color: #ffd700;
            transform: translateY(-5px);
        }

        @media (max-width: 700px) {
            header {
                flex-direction: column;
                text-align: center;
            }
            nav {
                justify-content: center;
            }
            .header-title h2 {
                font-size: 36px;
            }
            .news-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-container">
                <div class="custom-logo">
                    <div class="logo-circle">
                        <span class="logo-text">H<span class="logo-highlight">2</span></span>
                        <div class="crosshair"></div>
                    </div>
                    <div class="logo-ring"></div>
                </div>
                <h1>CS2 HUB</h1>
            </div>
            <nav>
                <a href="https://hpr204.github.io/cs2/">Главная</a>
                <a href="#" class="active">Новости</a>
                <a href="https://hpr204.github.io/Gaidivcs2/">Гайды</a>
                <a href="https://hpr204.github.io/cybersportcs2/">Матчи</a>
            </nav>
        </header>

        <div class="header-title">
            <h2>🎯 НОВОСТИ CS2</h2>
            <p>Реальные новости Counter-Strike 2 с HLTV.org на русском</p>
            <div class="live-indicator">
                <div class="live-dot"></div>
                <span>Обновляется каждые 5 минут</span>
            </div>
        </div>

        <div class="news-grid" id="newsGrid">
            <div class="loading">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Загрузка свежих новостей...</p>
            </div>
        </div>

        <footer>
            <p>Данные предоставлены <a href="https://www.hltv.org" target="_blank">HLTV.org</a> | © 2026 Новости CS2</p>
            <div class="social-links">
                <a href="#"><i class="fab fa-discord"></i></a>
                <a href="#"><i class="fab fa-telegram"></i></a>
                <a href="#"><i class="fab fa-twitch"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
                <a href="#"><i class="fab fa-steam"></i></a>
            </div>
        </footer>
    </div>

    <script>
        async function fetchRealNews() {
            const newsGrid = document.getElementById('newsGrid');
            
            try {
                const response = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.hltv.org/rss/news');
                const data = await response.json();
                
                if (data.items && data.items.length > 0) {
                    const news = data.items;
                    
                    newsGrid.innerHTML = news.map(item => {
                        const description = item.description
                            .replace(/<[^>]*>/g, '')
                            .substring(0, 180) + '...';
                        
                        const pubDate = new Date(item.pubDate);
                        const now = new Date();
                        const diffHours = Math.floor((now - pubDate) / (1000 * 60 * 60));
                        
                        let timeText;
                        if (diffHours < 1) {
                            timeText = 'только что';
                        } else if (diffHours < 24) {
                            timeText = `${diffHours} ${getHoursText(diffHours)} назад`;
                        } else {
                            const diffDays = Math.floor(diffHours / 24);
                            timeText = `${diffDays} ${getDaysText(diffDays)} назад`;
                        }
                        
                        return `
                            <div class="news-card">
                                <div class="news-source">
                                    <i class="fas fa-newspaper"></i>
                                    <span>HLTV.org</span>
                                </div>
                                <h3>${item.title}</h3>
                                <p>${description}</p>
                                <div class="news-footer">
                                    <span>
                                        <i class="far fa-clock"></i> 
                                        ${timeText}
                                    </span>
                                    <a href="${item.link}" target="_blank" class="news-link">
                                        Читать <i class="fas fa-arrow-right"></i>
                                    </a>
                                </div>
                            </div>
                        `;
                    }).join('');
                } else {
                    throw new Error('Нет новостей');
                }
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                
                newsGrid.innerHTML = `
                    <div class="error">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Не удалось загрузить новости</h3>
                        <p>Попробуйте перейти на <a href="https://www.hltv.org" target="_blank">HLTV.org</a> напрямую</p>
                    </div>
                `;
            }
        }

        function getHoursText(hours) {
            if (hours === 1) return 'час';
            if (hours >= 2 && hours <= 4) return 'часа';
            return 'часов';
        }

        function getDaysText(days) {
            if (days === 1) return 'день';
            if (days >= 2 && days <= 4) return 'дня';
            return 'дней';
        }

        fetchRealNews();
        setInterval(fetchRealNews, 300000);
    </script>
</body>
</html>
